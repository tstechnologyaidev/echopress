<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administration | EchoPress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/user-v2.css" />
    <style>
      .admin-layout { margin-top: 40px; margin-bottom: 60px; max-width: 1400px; }
      .admin-header {
        margin-bottom: 30px;
        border-bottom: 1px solid var(--glass-border);
        padding-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .admin-header h1 { font-family: 'Outfit', sans-serif; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .admin-panel { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; align-items: start; }
      
      .form-section {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        padding: 30px;
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-dim); }
      .form-group input, .form-group textarea, .form-group select {
        width: 100%; padding: 12px; font-family: inherit; border: 1px solid var(--glass-border); border-radius: 12px;
        background: #121212; color: white; transition: all 0.3s;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
      }
      .form-group input:focus, .form-group select:focus { border-color: var(--accent); outline: none; background: #1a1a1a; box-shadow: 0 0 0 4px var(--accent-glow); }
      
      select option { background: #1a1a1a; color: white; }
      
      .manage-section {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        padding: 25px;
        border-radius: 20px;
        border: 1px solid var(--glass-border);
      }
      
      .article-row {
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--glass-border);
        padding: 15px;
        margin-bottom: 12px;
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s;
      }
      .article-row:hover { transform: translateY(-3px); border-color: var(--accent); background: rgba(255,255,255,0.05); }
      
      #user-management-section {
        margin-top: 50px;
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        padding: 40px;
        border-radius: 32px;
        border: 1px solid var(--glass-border);
      }
      .user-tabs { display: flex; gap: 10px; margin-bottom: 30px; }
      .user-tab { 
        padding: 10px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: all 0.3s;
        background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-dim);
      }
      .user-tab.active { background: var(--gradient); border: none; color: white; }
      
      .user-list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
      
      #punishment-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; }
      .modal-content { background: var(--bg-deep); padding: 40px; border-radius: 32px; width: 450px; border: 1px solid var(--glass-border); }
      
      /* Security Gatekeeper */
      #security-gatekeeper { position: fixed; inset: 0; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(40px); z-index: 99999; display: flex; align-items: center; justify-content: center; }
      .security-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 3rem; border-radius: 40px; width: 100%; max-width: 500px; text-align: center; }
      
      #admin-main-content { display: none; }
    </style>
  </head>
  <body>
    <div id="security-gatekeeper">
      <div class="security-card">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🛡️</div>
        <h2>Accès Restreint</h2>
        <p>Veuillez compléter l'authentification pour accéder à l'administration.</p>
        <form id="security-form">
          <div class="security-group"><label>PIN 1</label><input type="password" id="pin-1" required></div>
          <div class="security-group"><label>PIN 2</label><input type="password" id="pin-2" required></div>
          <button type="submit" class="btn">Vérifier l'identité</button>
        </form>
        <div id="security-error-msg" class="security-error"></div>
      </div>
    </div>

    <div id="admin-main-content">
      <header class="header">
        <div class="header-top container">
          <div class="header-logo"><a href="/">ECHOPRESS</a></div>
        </div>
      </header>

      <main class="container admin-layout">
        <div class="admin-header"><h1 id="admin-title">Panneau d'administration</h1></div>
        
        <div class="admin-panel">
          <div class="form-section">
            <h3 id="form-title-display">Créer un article</h3>
            <form id="create-article-form">
              <input type="hidden" id="art-id">
              <div class="form-group"><label>Auteur</label><input type="text" id="art-author" required></div>
              <div class="form-group"><label>Titre</label><input type="text" id="art-title" required></div>
              <div class="form-group">
                <label>Catégorie</label>
                <select id="art-category"><option value="actualites">Actualités</option><option value="videos">Vidéos</option></select>
              </div>
              <div class="form-group"><label>Sous-catégorie</label><select id="art-sub-category" disabled></select></div>
              <div class="form-group">
                <label id="label-image-file">Média</label>
                <input type="file" id="art-image-file">
                <input type="text" id="art-video-url" style="display:none;" placeholder="Lien YouTube">
              </div>
              <div id="youtube-preview-container" style="display:none;"><iframe id="youtube-preview-iframe" style="width:100%; aspect-ratio:16/9;"></iframe></div>
              <div class="form-group"><label>Contenu</label><div id="quill-editor" style="height:200px;"></div><textarea id="art-video-desc" style="display:none;"></textarea></div>
              <button type="submit" class="btn">Enregistrer</button>
            </form>
          </div>
          <div class="manage-section"><h3>Articles</h3><div id="articles-list"></div></div>
        </div>

        <div id="user-management-section" style="display:none;">
          <h3>Comptes</h3>
          <div class="user-tabs"><div class="user-tab active" onclick="switchUserTab('journalist')">Journalistes</div><div class="user-tab" onclick="switchUserTab('user')">Public</div></div>
          <div id="users-list" class="user-list-grid"></div>
          
          <div style="margin-top:40px;">
            <h3>À Propos</h3>
            <div id="quill-about-editor" style="height:150px;"></div>
            <button id="save-about-btn" class="btn">Sauvegarder</button>
          </div>
        </div>
      </main>
    </div>

    <div id="punishment-modal"><div class="modal-content"><h4>Sanction</h4><textarea id="punishment-reason"></textarea><div id="password-reset-field" style="display:none;"><input type="text" id="new-password"></div><button id="modal-confirm-btn" class="btn">Confirmer</button><button onclick="closeModal()" class="btn">Annuler</button></div></div>

    <script type="module" src="/src/auth-ui.js"></script>
    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
