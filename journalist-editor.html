<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Éditeur d'article | EchoPress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
      .editor-layout { margin-top: 40px; margin-bottom: 60px; max-width: 900px; margin-left: auto; margin-right: auto; }
      .form-section { background-color: var(--lp-gray-light); padding: 30px; border-radius: 8px; border: 1px solid var(--lp-gray-mid); }
      .form-group { margin-bottom: 15px; }
      .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
      .form-group input, .form-group select { width: 100%; padding: 10px; font-family: var(--font-sans); border: 1px solid var(--lp-gray-mid); border-radius: 4px; }
      .btn { background: var(--sunset-gradient); color: #fff; border: none; padding: 12px 25px; cursor: pointer; border-radius: 6px; font-weight: 700; font-size: 16px; transition: opacity 0.2s; }
      .btn:hover { opacity: 0.9; }
      .btn-back { background-color: var(--lp-gray-mid); margin-right: 10px; text-decoration: none; display: inline-block; padding: 12px 25px; color: var(--lp-black); border-radius: 6px; font-weight: 700; transition: opacity 0.2s; }
      .btn-back:hover { opacity: 0.8; }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-top container">
        <div class="header-logo"><a href="/">ECHOPRESS</a></div>
        <div class="header-actions">
           <a href="/" class="btn-soutien">Voir le site</a>
           <div class="auth-links"></div>
        </div>
      </div>
    </header>

    <main class="container editor-layout">
      <div class="form-section">
        <h1 id="editor-page-title">Publier un nouvel article</h1>
        <form id="journalist-article-form" style="margin-top:20px;">
          <input type="hidden" id="art-id">
          <div class="form-group">
            <label>Surtitre (ex: Police, Succès)</label>
            <input type="text" id="art-surtitle" required>
          </div>
          <div class="form-group">
            <label>Titre de l'article</label>
            <input type="text" id="art-title" required>
          </div>
          <div class="form-group">
            <label>Catégorie</label>
            <select id="art-category" required>
              <option value="actualites">Actualités</option>
              <option value="international">International</option>
              <option value="dialogue">Dialogue</option>
              <option value="contexte">Contexte</option>
              <option value="affaires">Affaires</option>
              <option value="sports">Sports</option>
              <option value="auto">Auto</option>
              <option value="arts">Arts</option>
              <option value="cinema">Cinéma</option>
              <option value="societe">Société</option>
              <option value="gourmand">Gourmand</option>
              <option value="voyage">Voyage</option>
              <option value="maison">Maison</option>
            </select>
          </div>
          <div class="form-group">
            <label>Sous-catégorie</label>
            <select id="art-sub-category" disabled>
              <option value="">-- Sélectionner une catégorie d'abord --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Image (fichier uploader)</label>
            <input type="file" id="art-image-file" accept="image/*">
            <div id="image-preview-container" style="margin-top: 10px; display: none;">
              <img id="image-preview" src="" style="max-width: 100%; max-height: 200px; border-radius: 4px; border: 1px solid var(--lp-gray-mid);">
            </div>
          </div>
          <div class="form-group">
            <label>Crédit photo (optionnel)</label>
            <input type="text" id="art-image-credit" placeholder="ex: Agence QMI">
          </div>
          <div class="form-group">
            <label>Contenu de l'article</label>
            <div id="quill-editor" style="height: 300px; background-color: var(--lp-white);"></div>
          </div>
          <div style="margin-top: 30px;">
            <a href="journalist.html" class="btn-back">Annuler</a>
            <button type="submit" class="btn" id="submit-btn">Publier l'article</button>
          </div>
        </form>
      </div>
    </main>

    <script type="module" src="/src/auth-ui.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script type="module">
      import { categories } from "/src/data.js";
      
      const userStr = localStorage.getItem("echopress_user");
      const user = userStr ? JSON.parse(userStr) : null;
      if (!user || user.role !== "journalist") {
        window.location.href = "/";
      }

      // Check if we're in edit mode
      const urlParams = new URLSearchParams(window.location.search);
      const editingId = urlParams.get('id');
      let originalPublishedTime = '';
      let originalAuthor = '';
      let existingImageUrl = '';
      let currentApproval = null;

      if (editingId) {
        document.getElementById('editor-page-title').textContent = 'Modifier l\'article';
        document.getElementById('submit-btn').textContent = 'Mettre à jour l\'article';
      }

      const categorySelect = document.getElementById("art-category");
      const subCategorySelect = document.getElementById("art-sub-category");

      categorySelect.addEventListener("change", (e) => {
        const cat = categories.find(c => c.id === e.target.value);
        subCategorySelect.innerHTML = "<option value=''>-- Sélectionner une sous-catégorie --</option>";
        if (cat && cat.subCategories) {
          cat.subCategories.forEach(sub => {
            const opt = document.createElement("option");
            opt.value = sub;
            opt.textContent = sub;
            subCategorySelect.appendChild(opt);
          });
          subCategorySelect.disabled = false;
        } else {
          subCategorySelect.disabled = true;
        }
      });

      const quill = new Quill("#quill-editor", { 
        theme: "snow",
        modules: {
          keyboard: {
            bindings: {
              'exit-blockquote': {
                key: 13, // Enter
                shiftKey: true,
                format: ['blockquote'],
                handler: function(range, context) {
                  this.quill.insertText(range.index, '\n', 'user');
                  this.quill.setSelection(range.index + 1, 0, 'silent');
                  this.quill.format('blockquote', false, 'user');
                  return false;
                }
              }
            }
          }
        }
      });

      // Citation shortcut: typing '>' at the start of a line
      quill.on('text-change', (delta, oldDelta, source) => {
        if (source !== 'user') return;
        const selection = quill.getSelection();
        if (selection) {
          const [line, offset] = quill.getLine(selection.index);
          const text = line.domNode.textContent;
          if (text === '>') {
            quill.deleteText(selection.index - 1, 1);
            quill.formatLine(selection.index - 1, 1, 'blockquote', true);
          }
        }
      });

      document.getElementById("art-image-file").addEventListener("change", (e) => {
        if (e.target.files && e.target.files[0]) {
          document.getElementById("image-preview").src = URL.createObjectURL(e.target.files[0]);
          document.getElementById("image-preview-container").style.display = "block";
        }
      });

      function getFormattedTimestamp() {
        const now = new Date();
        return `Publié à ${String(now.getHours()).padStart(2, "0")} h ${now.getMinutes().toString().padStart(2, "0")}`;
      }

      async function loadArticleForEdit(id) {
        let res;
        try {
          // Use a direct fetch that doesn't increment views
          const allRes = await fetch('/api/articles');
          if (!allRes.ok) { console.error('Failed to fetch articles list'); return; }
          const all = await allRes.json();
          const art = all.find(a => String(a.id) === String(id));
          if (!art) { console.error('Article not found with id:', id); return; }

          // Store originals to preserve on save
          originalPublishedTime = art.published_time || '';
          originalAuthor = art.author || '';
          existingImageUrl = art.image || '';

          document.getElementById('art-surtitle').value = art.surtitle || '';
          document.getElementById('art-title').value = art.title || '';
          document.getElementById('art-category').value = art.category || '';
          document.getElementById('art-image-credit').value = art.image_credit || '';

          // Trigger sub-category population
          const cat = categories.find(c => c.id === art.category);
          const subCategorySelect = document.getElementById('art-sub-category');
          subCategorySelect.innerHTML = "<option value=''>-- Sélectionner une sous-catégorie --</option>";
          if (cat && cat.subCategories) {
            cat.subCategories.forEach(sub => {
              const opt = document.createElement('option');
              opt.value = sub;
              opt.textContent = sub;
              if (sub === art.sub_category) opt.selected = true;
              subCategorySelect.appendChild(opt);
            });
            subCategorySelect.disabled = false;
          }

          quill.root.innerHTML = art.summary || '';

          if (art.image) {
            const imgSrc = art.image.startsWith('http') ? art.image : '/' + art.image;
            document.getElementById('image-preview').src = imgSrc;
            document.getElementById('image-preview-container').style.display = 'block';
          }

          // Check if this edit is via an approval request
          if (art.author_username !== user.username) {
            const checkRes = await fetch(`/api/edit-requests/check-valid?article_id=${id}&requested_by=${encodeURIComponent(user.username)}`);
            if (checkRes.ok) {
              const data = await checkRes.json();
              currentApproval = data.approval;
              console.log('Active approval:', currentApproval);
            }
          }
        } catch(err) {
          console.error('Error loading article for edit:', err);
        }
      }

      if (editingId) {
        loadArticleForEdit(editingId);
      }

      document.getElementById("journalist-article-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        let imageUrl = existingImageUrl;
        const fileInput = document.getElementById("art-image-file");
        if (fileInput.files.length > 0) {
          const formData = new FormData();
          formData.append("image", fileInput.files[0]);
          const uploadRes = await fetch("/api/upload", { method: "POST", body: formData });
          if(uploadRes.ok) {
            const data = await uploadRes.json();
            imageUrl = data.url;
          }
        }

        const payload = {
          author: editingId ? originalAuthor : user.username,
          surtitle: document.getElementById("art-surtitle").value,
          title: document.getElementById("art-title").value,
          category: document.getElementById("art-category").value,
          sub_category: document.getElementById("art-sub-category").value,
          image: imageUrl,
          image_credit: document.getElementById("art-image-credit").value,
          summary: quill.root.innerHTML,
          published_time: editingId ? originalPublishedTime : getFormattedTimestamp()
        };

        if (editingId) {
          payload.modified_by = user.username;
          const res = await fetch(`/api/articles/${editingId}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            // Fulfill one-time approval if it exists
            if (currentApproval && currentApproval.is_one_time) {
              await fetch(`/api/edit-requests/${currentApproval.id}/fulfill`, { method: 'POST' });
            }
            alert("Article mis à jour avec succès !");
            window.location.href = "journalist.html";
          } else {
            let errMsg = 'Erreur inconnue';
            try { const d = await res.json(); errMsg = d.error || JSON.stringify(d); } catch(ex) {}
            alert('Erreur lors de la mise à jour: ' + errMsg);
          }
        } else {
          payload.author_username = user.username;
          const res = await fetch("/api/articles", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            alert("Article publié avec succès !");
            window.location.href = "journalist.html";
          } else {
            let errMsg = 'Erreur inconnue';
            try { const d = await res.json(); errMsg = d.error || JSON.stringify(d); } catch(ex) {}
            alert('Erreur lors de la publication: ' + errMsg);
          }
        }
      });
    </script>
  </body>
</html>
