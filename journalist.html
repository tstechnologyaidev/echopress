<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Espace Journaliste | EchoPress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      .journalist-layout { margin-top: 40px; margin-bottom: 60px; }
      .welcome-card {
        background: var(--lp-gray-light);
        padding: 30px 40px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid var(--lp-gray-mid);
        margin-bottom: 40px;
      }
      .welcome-card h1 { font-family: var(--font-serif); font-size: 28px; }
      .btn-large {
        padding: 12px 30px;
        font-size: 16px;
        background: var(--sunset-gradient);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 700;
        transition: transform 0.2s, opacity 0.2s;
        display: inline-block;
        white-space: nowrap;
      }
      .btn-large:hover { opacity: 0.9; transform: translateY(-2px); }

      .articles-section h2 {
        font-family: var(--font-serif);
        font-size: 24px;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid var(--lp-gray-mid);
      }

      .article-manage-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        background: var(--lp-gray-light);
        border: 1px solid var(--lp-gray-mid);
        border-left: 4px solid var(--lp-gray-mid);
        margin-bottom: 10px;
        border-radius: 4px;
        gap: 15px;
      }
      .article-manage-row.own { border-left-color: #00c6ff; }
      .article-manage-row .art-info h4 { font-family: var(--font-serif); margin-bottom: 4px; color: var(--lp-black); }
      .article-manage-row .art-info span { font-size: 12px; color: var(--lp-gray-dark); }
      .article-manage-row .art-actions { display: flex; gap: 8px; flex-shrink: 0; }

      .btn-edit { background: var(--sunset-gradient); color: #fff; border: none; padding: 7px 16px; font-size: 13px; font-weight: 700; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
      .btn-request { background: transparent; color: var(--lp-black); border: 1px solid var(--lp-gray-mid); padding: 7px 16px; font-size: 13px; font-weight: 600; border-radius: 4px; cursor: pointer; }
      .btn-request:hover { border-color: var(--lp-red); color: var(--lp-red); }
      .btn-pending { background: transparent; color: var(--lp-gray-dark); border: 1px solid var(--lp-gray-mid); padding: 7px 16px; font-size: 13px; border-radius: 4px; cursor: not-allowed; }

      /* Modal */
      .modal-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active { display: flex; }
      .modal {
        background: #111;
        border: 1px solid var(--lp-gray-mid);
        border-radius: 10px;
        padding: 30px;
        width: 90%;
        max-width: 500px;
      }
      .modal h3 { font-family: var(--font-serif); font-size: 22px; margin-bottom: 15px; }
      .modal p { font-size: 14px; color: var(--lp-gray-dark); margin-bottom: 15px; }
      .modal textarea {
        width: 100%; min-height: 100px; padding: 10px;
        font-family: var(--font-sans); font-size: 14px;
        border-radius: 4px; resize: vertical;
      }
      .modal-actions { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
      .btn-cancel { background: var(--lp-gray-mid); color: var(--lp-black); border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: 600; }
      .btn-submit-req { background: var(--sunset-gradient); color: #fff; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: 700; }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-top container">
        <div class="header-logo"><a href="/">ECHOPRESS</a></div>
        <div class="header-actions">
           <a href="/" class="btn-soutien">Voir le site</a>
           <div class="auth-links"></div>
        </div>
      </div>
    </header>

    <!-- Edit Request Modal -->
    <div class="modal-overlay" id="request-modal">
      <div class="modal">
        <h3>Demander une modification</h3>
        <p id="modal-article-name" style="color:var(--lp-red);font-weight:600;"></p>
        <p>Décrivez pourquoi vous souhaitez modifier cet article :</p>
        <textarea id="request-description" placeholder="Ex: Correction d'une erreur factuelle dans le paragraphe 2..."></textarea>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Annuler</button>
          <button class="btn-submit-req" onclick="submitRequest()">Envoyer la demande</button>
        </div>
      </div>
    </div>

    <main class="container journalist-layout">
      <div class="welcome-card">
        <h1>Bienvenue, <span id="journalist-name">Journaliste</span> !</h1>
        <a href="journalist-editor.html" class="btn-large">+ Publier un nouvel article</a>
      </div>

      <div class="articles-section">
        <h2>Tous les articles</h2>
        <div style="margin: 15px 0;">
          <input
            type="text"
            id="articles-search"
            placeholder="🔍 Chercher par titre ou auteur..."
            style="width: 100%; padding: 10px 14px; font-family: var(--font-sans); font-size: 14px; border: 1px solid var(--lp-gray-mid); border-radius: 6px; background: var(--lp-gray-light); color: var(--lp-black); outline: none; box-sizing: border-box;"
            oninput="filterArticles(this.value)"
          >
        </div>
        <div id="articles-list">
          <p style="color:var(--lp-gray-dark);">Chargement des articles...</p>
        </div>
      </div>
    </main>

    <script type="module" src="/src/auth-ui.js"></script>
    <script type="module">
      const userStr = localStorage.getItem("echopress_user");
      const user = userStr ? JSON.parse(userStr) : null;
      if (!user || user.role !== "journalist") {
        window.location.href = "/";
      }

      document.getElementById("journalist-name").textContent = user.username;

      let currentRequestArticleId = null;
      let currentRequestArticleTitle = null;

      let allArticlesCached = [];
      let requestMap = {};

      function renderList(articles) {
        const list = document.getElementById('articles-list');
        list.innerHTML = '';

        if (articles.length === 0) {
          list.innerHTML = '<p style="color:var(--lp-gray-dark);">Aucun article ne correspond.</p>';
          return;
        }

        articles.forEach(art => {
          const isOwn = art.authorUsername === user.username;
          const reqStatus = requestMap[art.id];

          let actionHtml = '';
          if (isOwn) {
            actionHtml = `<a href="journalist-editor.html?id=${art.id}" class="btn-edit">Modifier</a>`;
          } else if (reqStatus === 'approved') {
            actionHtml = `<a href="journalist-editor.html?id=${art.id}" class="btn-edit">Modifier</a>`;
          } else if (reqStatus === 'pending') {
            actionHtml = `<button class="btn-pending" disabled>⏳ Demande en attente</button>`;
          } else {
            actionHtml = `<button class="btn-request" onclick="openModal('${art.id}', ${JSON.stringify(art.title)})">Demander une modification</button>`;
          }

          const div = document.createElement('div');
          div.className = `article-manage-row ${isOwn ? 'own' : ''}`;
          div.innerHTML = `
            <div class="art-info">
              <h4>${art.title}</h4>
              <span>${art.category} — Par ${art.author || art.authorUsername || 'Inconnu'} — ${art.publishedTime}</span>
            </div>
            <div class="art-actions">${actionHtml}</div>
          `;
          list.appendChild(div);
        });
      }

      window.filterArticles = (query) => {
        const q = query.toLowerCase().trim();
        if (!q) { renderList(allArticlesCached); return; }
        const filtered = allArticlesCached.filter(a =>
          (a.title || '').toLowerCase().includes(q) ||
          (a.author || '').toLowerCase().includes(q) ||
          (a.authorUsername || '').toLowerCase().includes(q)
        );
        renderList(filtered);
      };

      // Load all articles + this journalist's existing requests
      async function loadAll() {
        const articlesRes = await fetch('/api/articles');
        const articles = articlesRes.ok ? await articlesRes.json() : [];
        allArticlesCached = articles;

        let myRequests = [];
        try {
          const requestsRes = await fetch(`/api/edit-requests/user/${encodeURIComponent(user.username)}`);
          if (requestsRes.ok) myRequests = await requestsRes.json();
        } catch (e) {
          // edit_requests table may not exist yet — articles still load
        }

        // Build a map: articleId -> request status
        requestMap = {};
        myRequests.forEach(r => {
          // Keep the most recent meaningful status per article
          if (!requestMap[r.articleId] || r.status === 'approved') {
            requestMap[r.articleId] = r.status;
          }
        });

        // Reset search bar
        const searchInput = document.getElementById('articles-search');
        if (searchInput) searchInput.value = '';

        renderList(articles);
      }


      // Modal controls
      window.openModal = (articleId, articleTitle) => {
        currentRequestArticleId = articleId;
        currentRequestArticleTitle = articleTitle;
        document.getElementById('modal-article-name').textContent = `« ${articleTitle} »`;
        document.getElementById('request-description').value = '';
        document.getElementById('request-modal').classList.add('active');
      };

      window.closeModal = () => {
        document.getElementById('request-modal').classList.remove('active');
        currentRequestArticleId = null;
        currentRequestArticleTitle = null;
      };

      window.submitRequest = async () => {
        const description = document.getElementById('request-description').value.trim();
        if (!description) {
          alert('Veuillez écrire une description de votre demande.');
          return;
        }
        const res = await fetch('/api/edit-requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            articleId: currentRequestArticleId,
            articleTitle: currentRequestArticleTitle,
            requestedBy: user.username,
            description
          })
        });
        if (res.ok) {
          closeModal();
          await loadAll();
        } else {
          alert('Erreur lors de l\'envoi de la demande.');
        }
      };

      // Close modal on overlay click
      document.getElementById('request-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      loadAll();
    </script>
  </body>
</html>
