<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoPress | Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/user-v2.css" />
    <style>
      .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: var(--glass-blur);
        padding: 3rem;
        border-radius: 32px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      }
      .login-card h2 { font-size: 2rem; margin-bottom: 2rem; text-align: center; }
      .form-group { margin-bottom: 1.5rem; }
      .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-dim); }
      .form-group input { 
        width: 100%; 
        padding: 1rem; 
        background: rgba(255,255,255,0.05); 
        border: 1px solid var(--glass-border); 
        border-radius: 12px; 
        color: white; 
        font-family: inherit;
        transition: border-color 0.3s;
      }
      .form-group input:focus { border-color: var(--accent); outline: none; }
      .login-btn { width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1rem; justify-content: center; }
      .toggle-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-dim); }
      .toggle-link a { color: var(--accent); font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="bg-orchestrator">
      <div class="bg-blob"></div>
      <div class="bg-blob"></div>
    </div>

    <div class="container login-container">
      <div class="login-card">
        <h2 id="auth-title">Bon retour !</h2>
        <form id="auth-form">
          <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="username" required placeholder="Votre pseudo">
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn login-btn" id="auth-submit">Se connecter</button>
        </form>
        <div class="toggle-link">
          <span id="auth-toggle-text">Pas encore de compte ?</span>
          <a href="#" id="auth-toggle-btn">S'inscrire</a>
        </div>
        <p id="auth-error" style="color: #ff4d4d; margin-top: 1rem; font-size: 0.85rem; text-align: center; display: none;"></p>
      </div>
    </div>

    <script type="module" src="/src/theme-engine.js"></script>

    
    <!-- Using the original login logic but updated for the new UI -->
    <script type="module">
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authSubmit = document.getElementById('auth-submit');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const authToggleText = document.getElementById('auth-toggle-text');
        const authError = document.getElementById('auth-error');

        let isLogin = true;

        authToggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            authTitle.textContent = isLogin ? 'Bon retour !' : 'Créer un compte';
            authSubmit.textContent = isLogin ? 'Se connecter' : "S'inscrire";
            authToggleText.textContent = isLogin ? 'Pas encore de compte ?' : 'Déjà inscrit ?';
            authToggleBtn.textContent = isLogin ? "S'inscrire" : 'Se connecter';
            authError.style.display = 'none';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/api/login' : '/api/register';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('echopress_user', JSON.stringify(data.user));
                    localStorage.setItem('echopress_token', data.token);
                    window.location.href = '/';
                } else {
                    authError.textContent = data.error || 'Une erreur est survenue';
                    authError.style.display = 'block';
                }
            } catch (err) {
                authError.textContent = 'Erreur de connexion au serveur';
                authError.style.display = 'block';
            }
        });
    </script>
  </body>
</html>
