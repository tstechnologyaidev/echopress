<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archives | EchoPress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/user-v2.css" />
    <style>
      .archives-layout { margin-top: 40px; margin-bottom: 60px; max-width: 1200px; }
      .archives-header {
        margin-bottom: 30px;
        border-bottom: 1px solid var(--glass-border);
        padding-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .archives-header h1 { font-family: 'Outfit', sans-serif; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 2.5rem; }
      
      .upload-section {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        padding: 25px;
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        margin-bottom: 40px;
        display: none; /* Shown for owner/supervisor */
      }
      
      .archives-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }
      
      .archive-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        aspect-ratio: 1/1;
      }
      .archive-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
      
      .archive-card img { width: 100%; height: 100%; object-fit: cover; }
      
      .archive-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s;
        padding: 15px;
        text-align: center;
      }
      .archive-card:hover .archive-overlay { opacity: 1; }
      
      .archive-desc { font-size: 0.8rem; color: white; margin-bottom: 10px; font-weight: 500; }
      
      .archive-actions { display: flex; gap: 8px; }
      .archive-btn {
        padding: 6px 12px;
        font-size: 0.75rem;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.1);
        color: white;
      }
      .archive-btn:hover { background: var(--accent); border-color: var(--accent); }
      .archive-btn.danger:hover { background: #ff4d4d; border-color: #ff4d4d; }

      /* Security Gatekeeper Overlay */
      #archive-gatekeeper {
        position: fixed;
        inset: 0;
        background: rgba(5, 5, 5, 0.9);
        backdrop-filter: blur(40px);
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .security-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        padding: 3rem;
        border-radius: 40px;
        width: 100%;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 50px 100px rgba(0,0,0,0.8);
      }
      .security-card h2 { font-family: 'Outfit'; font-size: 2rem; margin-bottom: 1rem; color: white; }
      .security-card p { color: var(--text-dim); margin-bottom: 2rem; }
      .security-group { margin-bottom: 1.5rem; }
      .security-group input {
        width: 100%;
        padding: 1rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        color: white;
        font-family: inherit;
        text-align: center;
        font-size: 1.1rem;
      }
      
      #archives-content { display: none; }
    </style>
  </head>
  <body>
    <div id="archive-gatekeeper">
      <div class="security-card">
        <div style="font-size: 3rem; margin-bottom: 1rem;">📁</div>
        <h2>Archives Sécurisées</h2>
        <p>Veuillez entrer le code d'accès pour consulter les archives EchoPress.</p>
        <form id="passcode-form">
          <div class="security-group">
            <input type="password" id="passcode" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn" style="width: 100%;">Accéder</button>
        </form>
        <p id="error-msg" style="color: #ff4d4d; margin-top: 1rem; font-size: 0.9rem;"></p>
      </div>
    </div>

    <div id="archives-content">
      <header class="header">
        <div class="header-top container">
          <div class="header-logo"><a href="/">ECHOPRESS</a></div>
          <div class="header-actions">
             <a href="/" class="btn-soutien">Retour au site</a>
             <div class="auth-links"></div>
          </div>
        </div>
      </header>

      <main class="container archives-layout">
        <div class="archives-header">
          <h1>Archives</h1>
        </div>

        <section id="upload-section" class="upload-section">
          <h3>Ajouter aux archives</h3>
          <form id="upload-form" style="display: flex; gap: 15px; margin-top: 15px; align-items: flex-end;">
            <div style="flex: 1;">
              <label style="display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px;">Image</label>
              <input type="file" id="archive-image" accept="image/*" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 8px; border-radius: 10px; color: white;">
            </div>
            <div style="flex: 2;">
              <label style="display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px;">Description (optionnel)</label>
              <input type="text" id="archive-desc" placeholder="Ex: Manifestation à Montréal..." style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 10px; border-radius: 10px; color: white;">
            </div>
            <button type="submit" class="btn" style="padding: 10px 20px;">Téléverser</button>
          </form>
        </section>

        <div id="archives-grid" class="archives-grid">
          <!-- Images will be loaded here -->
        </div>
      </main>
    </div>

    <script type="module" src="/src/theme-engine.js"></script>
    <script type="module" src="/src/auth-ui.js"></script>
    <script type="module">
      const PASSCODE = "EchoPressArchives2026!!";
      const gatekeeper = document.getElementById('archive-gatekeeper');
      const content = document.getElementById('archives-content');
      const passcodeForm = document.getElementById('passcode-form');
      const errorMsg = document.getElementById('error-msg');
      
      const userStr = localStorage.getItem("echopress_user");
      const user = userStr ? JSON.parse(userStr) : null;
      
      // Security check: Staff only
      if (!user || (user.role !== 'owner' && user.role !== 'supervisor' && user.role !== 'journalist' && user.role !== 'corrector')) {
        alert("Accès refusé. Les archives sont réservées au personnel.");
        window.location.href = "/";
      }

      passcodeForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (document.getElementById('passcode').value === PASSCODE) {
          gatekeeper.style.display = 'none';
          content.style.display = 'block';
          loadArchives();
          setupManagementUI();
        } else {
          errorMsg.textContent = "Code d'accès incorrect.";
          document.getElementById('passcode').value = "";
        }
      });

      function setupManagementUI() {
        if (user.role === 'owner' || user.role === 'supervisor') {
          document.getElementById('upload-section').style.display = 'block';
        }
      }

      async function loadArchives() {
        try {
          const res = await fetch('/api/archives');
          const archives = await res.json();
          renderArchives(archives);
        } catch (err) {
          console.error("Load archives error:", err);
        }
      }

      function renderArchives(archives) {
        const grid = document.getElementById('archives-grid');
        grid.innerHTML = '';
        
        archives.forEach(item => {
          const card = document.createElement('div');
          card.className = 'archive-card';
          
          let actionButtons = `<button class="archive-btn" onclick="window.downloadImage('${item.url}')">Télécharger</button>`;
          
          if (user.role === 'owner' || user.role === 'supervisor') {
            actionButtons += `<button class="archive-btn danger" onclick="window.deleteArchiveItem('${item.id}')">Supprimer</button>`;
          }
          
          card.innerHTML = `
            <img src="${item.url}" alt="${item.description || 'Archive item'}">
            <div class="archive-overlay">
              <div class="archive-desc">${item.description || 'Pas de description'}</div>
              <div class="archive-actions">
                ${actionButtons}
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      window.downloadImage = (url) => {
        const link = document.createElement('a');
        link.href = url;
        link.download = url.split('/').pop();
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      window.deleteArchiveItem = async (id) => {
        if (confirm("Voulez-vous vraiment supprimer cette image des archives ?")) {
          const res = await fetch(`/api/archives/${id}`, { method: 'DELETE' });
          if (res.ok) loadArchives();
        }
      };

      document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('archive-image');
        const descInput = document.getElementById('archive-desc');
        
        if (fileInput.files.length > 0) {
          const formData = new FormData();
          formData.append('image', fileInput.files[0]);
          
          try {
            const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
            if (uploadRes.ok) {
              const { url } = await uploadRes.json();
              const saveRes = await fetch('/api/archives', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, description: descInput.value })
              });
              
              if (saveRes.ok) {
                fileInput.value = '';
                descInput.value = '';
                loadArchives();
              }
            }
          } catch (err) {
            console.error("Upload error:", err);
          }
        }
      });
    </script>
  </body>
</html>
