<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>À Propos | EchoPress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/user-v2.css" />
    <script src="/security-guard.js"></script>
  </head>
  <body>
    <div class="bg-orchestrator">
      <div class="bg-blob"></div>
      <div class="bg-blob"></div>
    </div>

    <header class="header">
      <div class="container header-top">
        <div class="header-logo"><a href="/">ECHOPRESS</a></div>
        <div class="header-actions">
           <a href="/" class="btn-soutien">Retour à l'accueil</a>
        </div>
      </div>
    </header>

    <main class="container" style="margin-top: 4rem; max-width: 800px;">
      <section class="full-article" style="background: var(--glass-bg); padding: 4rem; border-radius: 32px; backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);">
        <h1 style="margin-bottom: 2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent;">À Propos de nous</h1>
        <div id="about-content" class="content">
          <!-- Populated by API -->
          <p>Chargement...</p>
        </div>
      </section>
    </main>

    <script type="module" src="/src/theme-engine.js"></script>
    <script type="module">
      // --- Automatic Public Token Fetcher ---
      const PUBLIC_TOKEN_KEY = 'public_token';
      const PUBLIC_TOKEN_TS_KEY = 'public_token_ts';

      async function getPublicToken() {
        const stored = localStorage.getItem(PUBLIC_TOKEN_KEY);
        const ts = parseInt(localStorage.getItem(PUBLIC_TOKEN_TS_KEY) || '0', 10);
        const now = Date.now();
        // Reuse token if less than 23 hours old
        if (stored && now - ts < 82800000) return stored;
        try {
          const res = await fetch('/api/public/token', {
            headers: { 'x-echo-client': 'EchoPress2026' }
          });
          if (!res.ok) throw new Error('Token fetch failed');
          const data = await res.json();
          localStorage.setItem(PUBLIC_TOKEN_KEY, data.token);
          localStorage.setItem(PUBLIC_TOKEN_TS_KEY, now.toString());
          return data.token;
        } catch (e) {
          console.error('Public token error:', e);
          return null;
        }
      }

      async function loadAbout() {
        try {
          const token = await getPublicToken();
          const res = await fetch('/api/settings/about_content', {
            headers: token ? { 'Authorization': `Bearer ${token}` } : {}
          });
          if (!res.ok) throw new Error(`Erreur ${res.status}`);
          const data = await res.json();
          const content = data.value && data.value.trim() !== '' && data.value !== '<p><br></p>'
            ? data.value
            : '<p>Aucun contenu disponible pour le moment.</p>';
          document.getElementById('about-content').innerHTML = content;
        } catch (e) {
          document.getElementById('about-content').innerHTML = '<p>Erreur lors du chargement du contenu.</p>';
          console.error('loadAbout error:', e);
        }
      }

      loadAbout();
    </script>
    <footer style="padding: 4rem 0; text-align: center; color: var(--text-dim); margin-top: 4rem; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-top: 1px solid var(--glass-border);">
      <div class="container">
        <p>© 2026 EchoLight Innovations. Tous droits réservés. | <a href="/normes.html" style="color: inherit; text-decoration: underline; opacity: 0.7;">Normes Journalistiques</a></p>
      </div>
    </footer>
  </body>
</html>
