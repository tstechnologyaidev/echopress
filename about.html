<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>À Propos | EchoPress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/user-v2.css" />
  </head>
  <body>
    <div class="bg-orchestrator">
      <div class="bg-blob"></div>
      <div class="bg-blob"></div>
    </div>

    <header class="header">
      <div class="container header-top">
        <div class="header-logo"><a href="/">ECHOPRESS</a></div>
        <div class="header-actions">
           <a href="/" class="btn-soutien">Retour à l'accueil</a>
        </div>
      </div>
    </header>

    <main class="container" style="margin-top: 4rem; max-width: 800px;">
      <section class="full-article" style="background: var(--glass-bg); padding: 4rem; border-radius: 32px; backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);">
        <h1 style="margin-bottom: 2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent;">À Propos de nous</h1>
        <div id="about-content" class="content">
          <!-- Populated by API -->
          <p>Chargement...</p>
        </div>
      </section>
    </main>

    <script type="module" src="/src/theme-engine.js"></script>
    <script type="module">
      async function loadAbout() {
        try {
          const res = await fetch('/api/settings/about_content');
          const data = await res.json();
          document.getElementById('about-content').innerHTML = data.value || '<p>Aucun contenu disponible.</p>';
        } catch (e) {
          document.getElementById('about-content').innerHTML = '<p>Erreur lors du chargement.</p>';
        }
      }
      loadAbout();
    </script>
  </body>
</html>
